global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "catch-junior-back"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: "kafka"
    static_configs:
      - targets: ["host.docker.internal:9308"]  # kafka-exporter 포트
